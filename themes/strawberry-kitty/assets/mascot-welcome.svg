<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Strawberry Kitty · welcome · sparkle eyes, open smile, waving -->
  <!-- Body -->
  <path d="M9 4 L15 4 A4 4 0 0 1 19 8 L19 12 A4 4 0 0 1 15 16 L9 16 A4 4 0 0 1 5 12 L5 8 A4 4 0 0 1 9 4 Z"
        fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <!-- Cat ear tips -->
  <path d="M6 4.3 L6.8 1.8 L9 4 Z" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <path d="M18 4.3 L17.2 1.8 L15 4 Z" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <!-- Left arm (lowered) -->
  <rect x="1" y="10" width="3" height="4" rx="0.8" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <!-- Right arm (raised waving) -->
  <rect x="20" y="3" width="3" height="4" rx="0.8" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6" transform="rotate(-15 21.5 5)"/>
  <!-- Legs -->
  <rect x="7.2" y="17" width="3.5" height="4" rx="1.2" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <rect x="13.3" y="17" width="3.5" height="4" rx="1.2" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <!-- Big round eyes (pupils) -->
  <ellipse cx="9.3" cy="10" rx="1.3" ry="1.8" fill="currentColor"/>
  <ellipse cx="14.7" cy="10" rx="1.3" ry="1.8" fill="currentColor"/>
  <!-- Sparkle highlights -->
  <circle cx="9.7" cy="9.2" r="0.55" fill="#FFFFFF"/>
  <circle cx="15.1" cy="9.2" r="0.55" fill="#FFFFFF"/>
  <circle cx="8.8" cy="10.5" r="0.22" fill="#FFFFFF"/>
  <circle cx="14.2" cy="10.5" r="0.22" fill="#FFFFFF"/>
  <!-- Yellow nose -->
  <ellipse cx="12" cy="11.4" rx="0.5" ry="0.35" fill="#F7C948"/>
  <!-- Happy smile -->
  <path d="M10.8 12.6 Q12 13.8 13.3 12.5" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Whiskers -->
  <g stroke="currentColor" stroke-width="0.4" stroke-linecap="round">
    <line x1="5.5" y1="10.5" x2="7" y2="10.5"/>
    <line x1="5.5" y1="11.5" x2="7" y2="11.5"/>
    <line x1="17" y1="10.5" x2="18.5" y2="10.5"/>
    <line x1="17" y1="11.5" x2="18.5" y2="11.5"/>
  </g>
  <!-- Red bow on right ear -->
  <path d="M17.2 3.3 L16.2 2.5 L16.2 4 Z" fill="#E14560"/>
  <path d="M17.2 3.3 L18.2 2.5 L18.2 4 Z" fill="#E14560"/>
  <circle cx="17.2" cy="3.3" r="0.35" fill="#E14560"/>
  <!-- Strawberry charm on left ear -->
  <path d="M6.7 5.2 Q6 6 6.2 6.8 Q6.6 7.6 7.4 7.5 Q8 7.2 8.1 6.3 Q8 5.4 7.4 5.1 Z" fill="#E14560"/>
  <path d="M6.5 5.1 L7.6 4.9 L7.5 5.4 L6.9 5.5 Z" fill="#6DB56D"/>
  <circle cx="6.9" cy="6.0" r="0.1" fill="#FFF2A8"/>
  <circle cx="7.4" cy="6.3" r="0.1" fill="#FFF2A8"/>
  <!-- Cheerful sparkle -->
  <path d="M2.5 2 L2.8 2.7 L3.5 3 L2.8 3.3 L2.5 4 L2.2 3.3 L1.5 3 L2.2 2.7 Z" fill="#E14560"/>
</svg>
