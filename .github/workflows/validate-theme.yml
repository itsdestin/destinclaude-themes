name: Validate Theme PR

on:
  pull_request:
    paths:
      - 'themes/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find changed theme directories
        id: changed
        run: |
          THEMES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep '^themes/' | cut -d'/' -f2 | sort -u)
          echo "themes=$THEMES" >> $GITHUB_OUTPUT

      - name: Validate manifests
        run: |
          for slug in ${{ steps.changed.outputs.themes }}; do
            MANIFEST="themes/$slug/manifest.json"
            if [ ! -f "$MANIFEST" ]; then
              echo "::error::Missing manifest.json for theme '$slug'"
              exit 1
            fi

            # Validate JSON syntax
            if ! python3 -c "import json; json.load(open('$MANIFEST'))"; then
              echo "::error::Invalid JSON in $MANIFEST"
              exit 1
            fi

            # Check required fields
            python3 -c "
          import json, sys
          m = json.load(open('$MANIFEST'))
          required = ['name', 'slug', 'dark', 'tokens']
          missing = [f for f in required if f not in m]
          if missing:
              print(f'::error::$MANIFEST missing required fields: {missing}')
              sys.exit(1)
          tokens = m.get('tokens', {})
          req_tokens = ['canvas','panel','inset','well','accent','on-accent','fg','fg-2','fg-dim','fg-muted','fg-faint','edge','edge-dim','scrollbar-thumb','scrollbar-hover']
          missing_tokens = [t for t in req_tokens if t not in tokens]
          if missing_tokens:
              print(f'::error::$MANIFEST missing tokens: {missing_tokens}')
              sys.exit(1)
          # Check for dangerous CSS patterns
          css = m.get('custom_css', '')
          import re
          if re.search(r'@import', css, re.I):
              print('::error::custom_css contains @import (not allowed)')
              sys.exit(1)
          if re.search(r'url\s*\(\s*[\"\\']?\s*(https?://|//|ftp://)', css, re.I):
              print('::error::custom_css contains external url() (not allowed)')
              sys.exit(1)
          if re.search(r'expression\s*\(', css, re.I):
              print('::error::custom_css contains expression() (not allowed)')
              sys.exit(1)
          if re.search(r'javascript\s*:', css, re.I):
              print('::error::custom_css contains javascript: (not allowed)')
              sys.exit(1)
          print(f'✓ {m[\"name\"]} ({slug}) — valid')
          "
          done

      - name: Reject fully-resolved theme-asset:// URIs in manifest
        # Asset paths must be relative (e.g. "assets/wallpaper.png"). The app's
        # resolveAllAssetPaths() rewrites them to theme-asset:// URIs at load time.
        # Fully-resolved URIs bypass build-registry.py's asset collector, so
        # registry ships with empty assetUrls and images never download. custom_css
        # is exempt — raw CSS legitimately uses theme-asset://.
        run: |
          for slug in ${{ steps.changed.outputs.themes }}; do
            MANIFEST="themes/$slug/manifest.json"
            if [ ! -f "$MANIFEST" ]; then continue; fi
            python3 -c "
          import json, sys
          m = json.load(open('$MANIFEST'))
          bad = []
          def walk(obj, path=''):
              if isinstance(obj, str):
                  if obj.startswith('theme-asset://'):
                      bad.append((path, obj))
              elif isinstance(obj, dict):
                  for k, v in obj.items():
                      if k == 'custom_css': continue
                      walk(v, f'{path}.{k}' if path else k)
              elif isinstance(obj, list):
                  for i, v in enumerate(obj):
                      walk(v, f'{path}[{i}]')
          walk(m)
          if bad:
              for p, v in bad:
                  print(f'::error::$MANIFEST field {p!r} uses theme-asset:// URI ({v!r}) — use a relative path like \"assets/name.ext\" instead')
              sys.exit(1)
          print(f'✓ $slug — no fully-resolved theme-asset:// URIs in manifest')
          "
          done

      - name: Check manifest asset references exist
        run: |
          for slug in ${{ steps.changed.outputs.themes }}; do
            MANIFEST="themes/$slug/manifest.json"
            if [ ! -f "$MANIFEST" ]; then continue; fi

            # Extract all string values starting with "assets/" from the manifest
            # and verify each file exists on disk
            python3 -c "
          import json, sys, os
          m = json.load(open('$MANIFEST'))

          def walk(obj):
              if isinstance(obj, str) and obj.startswith('assets/'):
                  yield obj
              elif isinstance(obj, dict):
                  for v in obj.values():
                      yield from walk(v)
              elif isinstance(obj, list):
                  for v in obj:
                      yield from walk(v)

          missing = []
          for ref in sorted(set(walk(m))):
              path = os.path.join('themes/$slug', ref)
              if not os.path.isfile(path):
                  missing.append(ref)

          if missing:
              for f in missing:
                  print(f'::error::Theme $slug manifest references missing asset: {f}')
              sys.exit(1)
          print(f'✓ $slug — all manifest asset references exist')
          "
          done

      - name: Check asset sizes
        run: |
          for slug in ${{ steps.changed.outputs.themes }}; do
            THEME_DIR="themes/$slug"
            SIZE=$(du -sb "$THEME_DIR" | cut -f1)
            MAX=$((10 * 1024 * 1024))  # 10 MB
            if [ "$SIZE" -gt "$MAX" ]; then
              echo "::error::Theme '$slug' exceeds 10MB limit (${SIZE} bytes)"
              exit 1
            fi
            echo "✓ $slug — ${SIZE} bytes (limit: ${MAX})"
          done

      - name: Check slug uniqueness
        run: |
          SLUGS=$(ls themes/ | sort)
          UNIQUE=$(echo "$SLUGS" | sort -u)
          if [ "$SLUGS" != "$UNIQUE" ]; then
            echo "::error::Duplicate theme slugs detected"
            exit 1
          fi
          echo "✓ All slugs unique"
