name: Update Registry

on:
  push:
    branches: [main]
    paths:
      - 'themes/**'
  # Allow manual re-runs (e.g. after fixing a CI regression that left the
  # registry stale, as happened April 2026 when three themes missed the
  # rebuild due to a missing npm install step).
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Force-regenerate all theme previews (overrides skip-when-exists)'
        required: false
        default: 'false'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Fix: generate-previews.js requires 'playwright' from node_modules.
      # Without `npm ci`, the workflow crashed with MODULE_NOT_FOUND and every
      # merge since 2026-04-12 failed to rebuild the registry, leaving new
      # themes (strawberry-kitty, kuromi-dreamer, devils-garden) invisible.
      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Generate theme previews
        # On push-triggered runs, github.event.inputs.force_regenerate is empty
        # string, so the conditional evaluates to '0' and skip-when-fresh is active.
        # Only a manual workflow_dispatch with force_regenerate=true forces a sweep.
        env:
          FORCE_REGENERATE_PREVIEWS: ${{ github.event.inputs.force_regenerate == 'true' && '1' || '0' }}
        run: node scripts/generate-previews.js

      - name: Rebuild registry
        run: python3 scripts/build-registry.py

      - name: Commit updated previews and registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add themes/*/preview.png registry/theme-registry.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: regenerate previews and registry [skip ci]"
            git push
          fi
